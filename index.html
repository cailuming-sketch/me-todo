<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>待办清单</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1d2433;
      --muted: #6c7689;
      --line: #dbe2ee;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --green: #12805c;
      --red: #c2413b;
      --yellow: #f59e0b;
      --shadow: 0 18px 50px rgba(35, 48, 74, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background:
        linear-gradient(135deg, rgba(37, 99, 235, 0.10), transparent 34%),
        linear-gradient(315deg, rgba(18, 128, 92, 0.10), transparent 30%),
        var(--bg);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 40px 0;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 24px;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 52px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .title p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(92px, 1fr));
      gap: 10px;
      min-width: 320px;
    }

    .stat {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      text-align: center;
    }

    .stat strong {
      display: block;
      font-size: 24px;
      line-height: 1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .workspace {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 20px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .composer {
      padding: 20px;
    }

    .composer h2,
    .list-panel h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field label {
      color: #334155;
      font-size: 14px;
      font-weight: 700;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      background: #fff;
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .primary {
      width: 100%;
      min-height: 46px;
      border-radius: 8px;
      color: #fff;
      background: var(--accent);
      font-weight: 700;
      transition: transform 160ms ease, background 160ms ease;
    }

    .primary:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    .tools {
      display: grid;
      gap: 12px;
      padding: 18px;
      border-bottom: 1px solid var(--line);
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px 10px 38px;
      outline: none;
    }

    .search svg {
      position: absolute;
      left: 12px;
      top: 50%;
      width: 18px;
      height: 18px;
      color: var(--muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 13px;
      color: #334155;
      background: #fff;
      font-weight: 700;
    }

    .filter.active {
      border-color: var(--accent);
      color: #fff;
      background: var(--accent);
    }

    .bulk {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
    }

    .ghost {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 12px;
      color: #334155;
      background: #fff;
      font-weight: 700;
    }

    .ghost.danger {
      color: var(--red);
    }

    .list-panel {
      overflow: hidden;
    }

    .list-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 20px 20px 0;
    }

    .list {
      display: grid;
      gap: 10px;
      max-height: 590px;
      overflow: auto;
      padding: 18px 20px 20px;
    }

    .todo {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
      min-height: 78px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }

    .todo.done {
      background: #f8fafc;
    }

    .check {
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 2px solid #b6c1d2;
      border-radius: 50%;
      color: transparent;
      background: #fff;
      line-height: 1;
      transition: all 150ms ease;
    }

    .todo.done .check {
      border-color: var(--green);
      color: #fff;
      background: var(--green);
    }

    .content {
      min-width: 0;
    }

    .todo-title {
      margin: 0;
      overflow-wrap: anywhere;
      font-size: 17px;
      font-weight: 800;
    }

    .todo.done .todo-title {
      color: var(--muted);
      text-decoration: line-through;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 3px 8px;
      background: #eef2ff;
      color: #3730a3;
      font-weight: 700;
    }

    .tag.high {
      background: #fee2e2;
      color: #b91c1c;
    }

    .tag.medium {
      background: #fef3c7;
      color: #92400e;
    }

    .tag.low {
      background: #dcfce7;
      color: #166534;
    }

    .tag.overdue {
      background: #ffe4e6;
      color: #be123c;
    }

    .actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #475569;
      background: #fff;
    }

    .icon-btn:hover {
      border-color: #b7c3d6;
      background: #f8fafc;
    }

    .icon-btn.delete {
      color: var(--red);
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 220px;
      border: 1px dashed #bcc7d8;
      border-radius: 8px;
      color: var(--muted);
      text-align: center;
      padding: 30px;
      background: #fafcff;
    }

    .empty strong {
      display: block;
      margin-bottom: 8px;
      color: #334155;
      font-size: 18px;
    }

    @media (max-width: 840px) {
      .app {
        width: min(100% - 20px, 720px);
        padding: 24px 0;
      }

      .topbar,
      .workspace {
        grid-template-columns: 1fr;
      }

      .topbar {
        display: grid;
      }

      .stats {
        min-width: 0;
      }
    }

    @media (max-width: 540px) {
      .stats,
      .row {
        grid-template-columns: 1fr;
      }

      .todo {
        grid-template-columns: auto 1fr;
      }

      .actions {
        grid-column: 2;
      }

      .list-head {
        align-items: start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <section class="title" aria-labelledby="app-title">
        <h1 id="app-title">待办清单</h1>
        <p id="todayText"></p>
      </section>
      <section class="stats" aria-label="任务统计">
        <div class="stat">
          <strong id="totalCount">0</strong>
          <span>全部</span>
        </div>
        <div class="stat">
          <strong id="activeCount">0</strong>
          <span>进行中</span>
        </div>
        <div class="stat">
          <strong id="doneCount">0</strong>
          <span>已完成</span>
        </div>
      </section>
    </header>

    <section class="workspace">
      <form class="panel composer" id="todoForm">
        <h2 id="formTitle">添加任务</h2>
        <input type="hidden" id="editingId">
        <div class="field">
          <label for="todoInput">任务名称</label>
          <input id="todoInput" type="text" maxlength="80" placeholder="例如：整理项目计划" required>
        </div>
        <div class="row">
          <div class="field">
            <label for="dueInput">截止日期</label>
            <input id="dueInput" type="date">
          </div>
          <div class="field">
            <label for="priorityInput">优先级</label>
            <select id="priorityInput">
              <option value="medium">中</option>
              <option value="high">高</option>
              <option value="low">低</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="categoryInput">分类</label>
          <input id="categoryInput" type="text" maxlength="20" placeholder="工作 / 学习 / 生活">
        </div>
        <button class="primary" type="submit" id="submitButton">添加任务</button>
      </form>

      <section class="panel list-panel" aria-labelledby="list-title">
        <div class="list-head">
          <h2 id="list-title">任务列表</h2>
          <select id="sortSelect" aria-label="排序方式">
            <option value="created">按创建时间</option>
            <option value="due">按截止日期</option>
            <option value="priority">按优先级</option>
          </select>
        </div>
        <div class="tools">
          <label class="search" for="searchInput">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="m21 21-4.35-4.35m1.35-5.65a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <input id="searchInput" type="search" placeholder="搜索任务">
          </label>
          <div class="filters" role="tablist" aria-label="筛选任务">
            <button class="filter active" type="button" data-filter="all">全部</button>
            <button class="filter" type="button" data-filter="active">进行中</button>
            <button class="filter" type="button" data-filter="done">已完成</button>
            <button class="filter" type="button" data-filter="today">今天</button>
          </div>
          <div class="bulk">
            <button class="ghost" type="button" id="completeAllButton">全部完成</button>
            <button class="ghost danger" type="button" id="clearDoneButton">清除已完成</button>
          </div>
        </div>
        <div class="list" id="todoList" aria-live="polite"></div>
      </section>
    </section>
  </main>

  <template id="todoTemplate">
    <article class="todo">
      <button class="check" type="button" aria-label="切换完成状态">✓</button>
      <div class="content">
        <p class="todo-title"></p>
        <div class="meta"></div>
      </div>
      <div class="actions">
        <button class="icon-btn edit" type="button" title="编辑任务" aria-label="编辑任务">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 20h4L18.5 9.5a2.8 2.8 0 0 0-4-4L4 16v4Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="m13.5 6.5 4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="icon-btn delete" type="button" title="删除任务" aria-label="删除任务">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 7h16M10 11v6M14 11v6M6 7l1 14h10l1-14M9 7V4h6v3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </article>
  </template>

  <script>
    const storageKey = "simple-todo-app-items";
    const priorityLabels = {
      high: "高优先级",
      medium: "中优先级",
      low: "低优先级"
    };
    const priorityWeight = {
      high: 3,
      medium: 2,
      low: 1
    };

    const state = {
      todos: loadTodos(),
      filter: "all",
      search: "",
      sort: "created"
    };

    const form = document.querySelector("#todoForm");
    const formTitle = document.querySelector("#formTitle");
    const editingId = document.querySelector("#editingId");
    const todoInput = document.querySelector("#todoInput");
    const dueInput = document.querySelector("#dueInput");
    const priorityInput = document.querySelector("#priorityInput");
    const categoryInput = document.querySelector("#categoryInput");
    const submitButton = document.querySelector("#submitButton");
    const list = document.querySelector("#todoList");
    const template = document.querySelector("#todoTemplate");
    const searchInput = document.querySelector("#searchInput");
    const sortSelect = document.querySelector("#sortSelect");
    const totalCount = document.querySelector("#totalCount");
    const activeCount = document.querySelector("#activeCount");
    const doneCount = document.querySelector("#doneCount");
    const todayText = document.querySelector("#todayText");

    todayText.textContent = new Intl.DateTimeFormat("zh-CN", {
      dateStyle: "full"
    }).format(new Date());

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const title = todoInput.value.trim();
      if (!title) return;

      const currentId = editingId.value;
      if (currentId) {
        state.todos = state.todos.map((todo) => {
          if (todo.id !== currentId) return todo;
          return {
            ...todo,
            title,
            due: dueInput.value,
            priority: priorityInput.value,
            category: categoryInput.value.trim()
          };
        });
      } else {
        state.todos.unshift({
          id: crypto.randomUUID(),
          title,
          due: dueInput.value,
          priority: priorityInput.value,
          category: categoryInput.value.trim(),
          done: false,
          createdAt: Date.now()
        });
      }

      resetForm();
      saveTodos();
      render();
    });

    searchInput.addEventListener("input", (event) => {
      state.search = event.target.value.trim().toLowerCase();
      render();
    });

    sortSelect.addEventListener("change", (event) => {
      state.sort = event.target.value;
      render();
    });

    document.querySelectorAll(".filter").forEach((button) => {
      button.addEventListener("click", () => {
        state.filter = button.dataset.filter;
        document.querySelectorAll(".filter").forEach((item) => {
          item.classList.toggle("active", item === button);
        });
        render();
      });
    });

    document.querySelector("#completeAllButton").addEventListener("click", () => {
      state.todos = state.todos.map((todo) => ({ ...todo, done: true }));
      saveTodos();
      render();
    });

    document.querySelector("#clearDoneButton").addEventListener("click", () => {
      state.todos = state.todos.filter((todo) => !todo.done);
      saveTodos();
      render();
    });

    function loadTodos() {
      try {
        const raw = localStorage.getItem(storageKey);
        return raw ? JSON.parse(raw) : getStarterTodos();
      } catch {
        return getStarterTodos();
      }
    }

    function saveTodos() {
      localStorage.setItem(storageKey, JSON.stringify(state.todos));
    }

    function getStarterTodos() {
      const today = new Date().toISOString().slice(0, 10);
      return [
        {
          id: crypto.randomUUID(),
          title: "写下今天最重要的三件事",
          due: today,
          priority: "high",
          category: "规划",
          done: false,
          createdAt: Date.now() - 3000
        },
        {
          id: crypto.randomUUID(),
          title: "清理一个拖延很久的小任务",
          due: "",
          priority: "medium",
          category: "生活",
          done: false,
          createdAt: Date.now() - 2000
        }
      ];
    }

    function render() {
      const visibleTodos = getVisibleTodos();
      list.innerHTML = "";

      if (!visibleTodos.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.innerHTML = "<div><strong>暂无匹配任务</strong><span>换个筛选条件，或添加一个新任务。</span></div>";
        list.append(empty);
      } else {
        visibleTodos.forEach((todo) => list.append(createTodoElement(todo)));
      }

      const done = state.todos.filter((todo) => todo.done).length;
      totalCount.textContent = state.todos.length;
      activeCount.textContent = state.todos.length - done;
      doneCount.textContent = done;
    }

    function getVisibleTodos() {
      const today = new Date().toISOString().slice(0, 10);
      return state.todos
        .filter((todo) => {
          if (state.filter === "active") return !todo.done;
          if (state.filter === "done") return todo.done;
          if (state.filter === "today") return todo.due === today;
          return true;
        })
        .filter((todo) => {
          const haystack = `${todo.title} ${todo.category}`.toLowerCase();
          return haystack.includes(state.search);
        })
        .sort((a, b) => {
          if (state.sort === "priority") {
            return priorityWeight[b.priority] - priorityWeight[a.priority];
          }
          if (state.sort === "due") {
            return normalizeDate(a.due) - normalizeDate(b.due);
          }
          return b.createdAt - a.createdAt;
        });
    }

    function createTodoElement(todo) {
      const node = template.content.firstElementChild.cloneNode(true);
      node.classList.toggle("done", todo.done);

      const check = node.querySelector(".check");
      check.addEventListener("click", () => toggleTodo(todo.id));

      node.querySelector(".todo-title").textContent = todo.title;
      const meta = node.querySelector(".meta");
      meta.append(createTag(priorityLabels[todo.priority], todo.priority));

      if (todo.category) {
        meta.append(createTag(todo.category));
      }

      if (todo.due) {
        const dueTag = createTag(formatDate(todo.due), isOverdue(todo) ? "overdue" : "");
        meta.append(dueTag);
      }

      node.querySelector(".edit").addEventListener("click", () => editTodo(todo.id));
      node.querySelector(".delete").addEventListener("click", () => deleteTodo(todo.id));
      return node;
    }

    function createTag(text, className = "") {
      const tag = document.createElement("span");
      tag.className = `tag ${className}`.trim();
      tag.textContent = text;
      return tag;
    }

    function toggleTodo(id) {
      state.todos = state.todos.map((todo) => {
        return todo.id === id ? { ...todo, done: !todo.done } : todo;
      });
      saveTodos();
      render();
    }

    function editTodo(id) {
      const todo = state.todos.find((item) => item.id === id);
      if (!todo) return;

      editingId.value = todo.id;
      todoInput.value = todo.title;
      dueInput.value = todo.due;
      priorityInput.value = todo.priority;
      categoryInput.value = todo.category;
      formTitle.textContent = "编辑任务";
      submitButton.textContent = "保存修改";
      todoInput.focus();
    }

    function deleteTodo(id) {
      state.todos = state.todos.filter((todo) => todo.id !== id);
      if (editingId.value === id) resetForm();
      saveTodos();
      render();
    }

    function resetForm() {
      form.reset();
      editingId.value = "";
      priorityInput.value = "medium";
      formTitle.textContent = "添加任务";
      submitButton.textContent = "添加任务";
    }

    function normalizeDate(value) {
      return value ? new Date(`${value}T00:00:00`).getTime() : Number.MAX_SAFE_INTEGER;
    }

    function formatDate(value) {
      return new Intl.DateTimeFormat("zh-CN", {
        month: "short",
        day: "numeric"
      }).format(new Date(`${value}T00:00:00`));
    }

    function isOverdue(todo) {
      if (!todo.due || todo.done) return false;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      return new Date(`${todo.due}T00:00:00`) < today;
    }

    render();
  </script>
</body>
</html>
